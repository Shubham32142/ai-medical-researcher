version: "3.9"
services:
  ai:
    build: ./apps/ai
    ports:
      - "8000:8000"
    env_file:
      - ./apps/ai/.env.example

  api:
    build: ./apps/api
    ports:
      - "4000:4000"
    depends_on:
      - ai

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    depends_on:
      - api
